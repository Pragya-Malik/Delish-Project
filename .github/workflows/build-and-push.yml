name: Build and Push

on:
  workflow_call:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build frontend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/delish-project-frontend:latest ./frontend

      - name: Build backend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/delish-project-backend:latest ./backend

      - name: Push images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/delish-project-frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/delish-project-backend:latest
