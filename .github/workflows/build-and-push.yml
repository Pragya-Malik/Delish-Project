name: Build and Push

on:
  workflow_call:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build frontend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/delish-frontend ./frontend

      - name: Build backend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/delish-backend ./backend

      - name: Push images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/delish-frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/delish-backend
