name: Build, Scan, and Push

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Images
      - name: Build Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/delish-project-frontend:latest ./frontend

      - name: Build Backend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/delish-project-backend:latest ./backend

      # Scan Frontend Image
      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/delish-project-frontend:latest
          severity: "CRITICAL"
          exit-code: 1

      # Scan Backend Image
      - name: Scan Backend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/delish-project-backend:latest
          severity: "CRITICAL"
          exit-code: 1              #without it, Trivy will only indicate errors but not fail

      # Push only if scans pass
      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/delish-project-frontend:latest

      - name: Push Backend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/delish-project-backend:latest
