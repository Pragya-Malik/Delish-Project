name: Container Scan

on:
  workflow_call:

jobs:
  Image-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Login to Docker-hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/delish-project-frontend:latest
          severity: "CRITICAL"

      - name: Scan backend image
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/delish-project-backend:latest
          severity: "CRITICAL"
