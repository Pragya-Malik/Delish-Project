name: Deploy to EC2

on:
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/delish-project-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/delish-project-frontend:latest

            docker stop backend || true
            docker stop frontend || true

            docker rm backend || true
            docker rm frontend || true

            docker run -d --name backend --network delish-net -p 5000:5000 ${{ secrets.DOCKER_USERNAME }}/delish-project-backend:latest
            docker run -d --name frontend -p 80:80 ${{ secrets.DOCKER_USERNAME }}/delish-project-frontend:latest
