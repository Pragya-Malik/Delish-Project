name: Deploy to EC2

on:
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/delish-project-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/delish-project-frontend:latest

            docker stop nginx || true
            docker stop backend || true
            docker stop frontend || true

            docker rm nginx || true
            docker rm backend || true
            docker rm frontend || true

            docker run -d \
            --name backend \
            --network delish-net \
            ${{ secrets.DOCKER_USERNAME }}/delish-project-backend:latest

            docker run -d \
            --name frontend \
            --network delish-net \
            ${{ secrets.DOCKER_USERNAME }}/delish-project-frontend:latest

            docker run -d \
            --name nginx \
            --network delish-net \
            -p 80:80 \
            -p 443:443 \
            -v /home/ubuntu/Delish-Project/nginx.conf:/etc/nginx/nginx.conf:ro \
            -v /home/ubuntu/Delish-Project/ssl:/etc/nginx/ssl:ro \
            nginx:alpine
