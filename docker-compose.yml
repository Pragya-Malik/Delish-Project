services:
  frontend:
    container_name: delish-frontend
    build: ./frontend
    ports:
      - "8080:80"
    restart: unless-stopped

  backend:
    container_name: delish-backend
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - db

  db:
    container_name: delish-db
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: restaurant
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
