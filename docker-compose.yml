# Docker compose file for Delish-Project

services:
  frontend:
    container_name: Delish-Project
    image: delish-app
    volumes: 
      - .:/usr/share/nginx/html
    ports:
      - 8080:80
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  
